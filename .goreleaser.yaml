version: 2

project_name: fusionlocalserver

before:
  hooks:
    # Build the embedded web UI before any go build so server/webdist ships
    # the current React/MUI bundle in release binaries.
    - make web
    - go mod tidy

builds:
  - id: fusionlocalserver
    main: .
    binary: fusionlocalserver
    # Embed the web UI (built by the `make web` before-hook above). Without this
    # tag the binary compiles against the static_stub.go "not built" shell.
    flags:
      - -tags=embed_ui
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X github.com/schneik80/fusionlocalserver/config.DefaultClientID={{ .Env.APS_CLIENT_ID }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: fusionlocalserver
    name_template: "{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

brews:
  - name: fusionlocalserver
    repository:
      owner: schneik80
      name: homebrew-fusionlocalserver
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/schneik80/fusionlocalserver"
    description: "Terminal browser for Autodesk Platform Services Manufacturing Data Model"
    license: "GPL-3.0"
    install: |
      bin.install "fusionlocalserver"
    commit_author:
      name: goreleaser
      email: goreleaser@users.noreply.github.com
    commit_msg_template: "chore: brew formula update for {{ .ProjectName }} {{ .Tag }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: schneik80
    name: fusionlocalserver
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  footer: |
    ## Install

    **Homebrew (macOS / Linux)**
    ```
    brew install schneik80/fusionlocalserver/fusionlocalserver
    ```

    **macOS (Apple Silicon)**
    ```
    curl -L https://github.com/schneik80/fusionlocalserver/releases/download/v{{ .Version }}/fusionlocalserver-{{ .Version }}-darwin-arm64.tar.gz | tar xz
    sudo mv fusionlocalserver /usr/local/bin/
    ```

    **macOS (Intel)**
    ```
    curl -L https://github.com/schneik80/fusionlocalserver/releases/download/v{{ .Version }}/fusionlocalserver-{{ .Version }}-darwin-amd64.tar.gz | tar xz
    sudo mv fusionlocalserver /usr/local/bin/
    ```

    **Linux**
    ```
    curl -L https://github.com/schneik80/fusionlocalserver/releases/download/v{{ .Version }}/fusionlocalserver-{{ .Version }}-linux-amd64.tar.gz | tar xz
    sudo mv fusionlocalserver /usr/local/bin/
    ```
